<html>
    <head>
        <title>Doctor's Appointment form</title>
    </head>
    <body>
        <h1>Doctor's Appointment form</h1>
        <form>
            <fieldset>
                <legend>Personal Information🤫</legend>
                <label>your name:</label>
                <input type="text" id="name" placeholder="enter your name"><br><br>
                <label>Patient id:</label>
                <input type="number" id="Patient id"><br><br>
                <label>Date of birth:</label>
                <input type="date" id="DOB">
            </fieldset>
            <br><br>
            <fieldset>
<legend><h4>Visit details</h4></legend>
                <label>Select a doctor:</label>
                <select id="doctor">
                    <option value="Dr. Smith">Dr. Smith</option>
                    <option value="Dr. Johnson">Dr. Johnson</option>
                    <option value="Dr. Lee">Dr. Lee</option>
                </select><br><br>
                <label> Why are you visiting?</label>
                <input type="radio" name="visit_reason" value="Checkup"> Checkup
                <input type="radio" name="visit_reason" value="Consultation"> Consultation
                <input type="radio" name="visit_reason" value="Follow-up"> Follow-up
            </fieldset>
        
                
            
                

        </form>
    </body>
</html>
